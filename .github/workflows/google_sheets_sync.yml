name: Google Sheets Data Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Google Sheet as XLSX
        # 구글의 최신 다운로드 주소 규격(&output=xlsx)을 적용하고, 다운로드 실패 시 상세 로그를 남기도록 수정했습니다.
        run: |
          curl -f -k -L -o "sheet_data.xlsx" "https://google.com{{ secrets.SPREADSHEET_ID }}/export?output=xlsx"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sheet_data.xlsx
          git diff --quiet && git diff --staged --quiet || (git commit -m "자동 업데이트: 최신 구글 시트 데이터 반영" && git push)
