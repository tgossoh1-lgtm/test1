name: Google Sheets Data Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Google Sheet as XLSX
        # 웹에 게시를 하지 않고, 일반 공유 링크 상태에서도 파일 형식만 우회하여 다운로드받는 전용 주소 규격입니다.
        run: |
          curl -f -k -L -o "sheet_data.xlsx" "https://google.com{{ secrets.SPREADSHEET_ID }}/export?format=xlsx"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sheet_data.xlsx
          git diff --quiet && git diff --staged --quiet || (git commit -m "자동 업데이트: 최신 구글 시트 데이터 반영" && git push)
