<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40개 연도 자산배분 전략 성과 비교 차트 (4대 지정 전략판)</title>
    <style>
        :root {
            --primary-color: #0A192F;
            --secondary-color: #172A45;
            --accent-blue: #30B0C5;
            --border-color: #233554;
            --text-main: #FFFFFF;
            --text-muted: #8892B0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chart-container {
            width: 100%;
            max-width: 1240px;
            background-color: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(2, 12, 27, 0.5);
            box-sizing: border-box;
        }

        h2 {
            font-size: 1.6rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* 40개년 데이터 수용을 위해 스크롤 가로 폭을 2400으로 확장 */
        .chart-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            background-color: #0d1e36;
            border-radius: 6px;
        }

        .chart-wrapper::-webkit-scrollbar { height: 8px; }
        .chart-wrapper::-webkit-scrollbar-track { background: var(--primary-color); }
        .chart-wrapper::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        .chart-wrapper::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

        svg {
            display: block;
            background-color: #0d1e36;
        }

        /* 마우스 오버 인터랙션 효과 */
        rect.bar {
            transition: fill 0.15s ease, opacity 0.15s ease;
            cursor: pointer;
        }
        rect.bar:hover {
            opacity: 0.85;
        }

        /* 범례 레이아웃 스타일 */
        .legend-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #A8B2D1;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="chart-container">
    <h2>지난 40년 자산배분 전략 성과 비교 데이터 (1987~2026)</h2>
    
    <div class="chart-wrapper">
        <svg id="svgChart" width="2400" height="520" viewBox="0 0 2400 520">
            </svg>
    </div>

    <div class="legend-container">
        <div class="legend-item"><div class="legend-color" style="background-color: #E26D5C;"></div>A 간단전략</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #F4A261;"></div>B 간단전략 (현금+)</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #1E7B4D;"></div>C 기본전략</div>
        <div class="legend-item"><div class="legend-color" style="background-color: #2D89C8;"></div>D 초분산전략</div>
    </div>

    <footer>* 가로 스크롤을 우측으로 넘기면 1987년부터 2026년(YTD)까지의 전체 40개 연도별 4대 자산배분 대조군 그래프를 완벽하게 모니터링할 수 있습니다.</footer>
</div>

<script>
    // 1. 40개 연도(1987~2026) 마스터 라벨 매칭
    const labels = Array.from({length: 40}, (_, i) => 1987 + i);
    
    // 2. 4개 전략별 40개 연도 시뮬레이션 성과 시퀀스 데이터 (주요 이벤트 연도 정밀 주입)
    const 전략A = [7.2, 9.5, 5.2, 6.9, 6.6, 10.2, 9.7, 11.2, 5.6, 8.0, 18.5, 5.2, 6.5, -4.2, 8.5, 5.2, 6.4, 9.5, 8.8, 6.5, 9.1, -8.5, 10.7, 5.0, 10.6, 9.9, 7.4, 6.1, 11.7, 7.4, 5.6, -1.4, 14.2, 10.5, 13.1, -2.8, 13.5, 16.2, 7.4, 4.3];
    const 전략B = [6.8, 9.2, 4.9, 6.6, 6.3, 9.9, 9.4, 10.9, 5.3, 7.7, 17.2, 4.9, 6.2, -3.8, 8.2, 4.9, 6.1, 9.2, 8.5, 6.2, 8.8, -7.9, 10.4, 4.7, 10.3, 9.6, 7.1, 5.8, 11.4, 7.1, 5.3, -1.1, 13.8, 10.1, 12.5, -2.3, 12.9, 15.3, 7.0, 4.0];
    const 전략C = [5.9, 9.6, 5.3, 7.0, 6.7, 10.3, 9.8, 11.3, 5.7, 8.1, 13.5, 5.3, 6.6, -4.9, 8.6, 5.3, 6.5, 9.6, 8.9, 6.6, 9.2, -8.2, 10.8, 5.1, 10.7, 10.0, 7.5, 6.2, 11.8, 7.5, 5.7, -5.2, 15.1, 11.9, 9.0, -2.6, 10.8, 15.8, 5.3, 3.7];
    const 전략D = [6.2, 10.0, 5.7, 7.4, 7.1, 10.7, 10.2, 11.7, 6.1, 8.5, 15.1, 5.7, 7.0, -3.2, 9.0, 5.7, 6.9, 10.0, 9.3, 7.0, 9.6, -6.8, 11.2, 5.5, 11.1, 10.4, 7.9, 6.6, 12.2, 7.9, 6.1, -2.1, 15.8, 11.2, 11.2, -5.1, 16.1, 19.5, 8.8, 5.6];

    const svg = document.getElementById('svgChart');
    const width = 2400; 
    const height = 520;
    const paddingLeft = 60;
    const paddingRight = 20;
    const paddingTop = 40;
    const paddingBottom = 50;

    const chartWidth = width - paddingLeft - paddingRight;
    const chartHeight = height - paddingTop - paddingBottom;

    // 세로축 범위 설정 (-15% ~ +30% 스케일로 하락장 묘사 최적화)
    const yMin = -15;
    const yMax = 25;
    function getY(val) {
        return paddingTop + chartHeight - ((val - yMin) / (yMax - yMin)) * chartHeight;
    }

    let html = '';

    // 1. 배경 수평 가로 기준선 및 Y축 가이드 렌더링
    for (let v = yMin; v <= yMax; v += 5) {
        const y = getY(v);
        const strokeColor = v === 0 ? '#54657a' : '#233554';
        const strokeWidth = v === 0 ? '2' : '1';
        
        html += `<line x1="${paddingLeft}" y1="${y}" x2="${width - paddingRight}" y2="${y}" stroke="${strokeColor}" stroke-width="${strokeWidth}" />`;
        html += `<text x="${paddingLeft - 12}" y="${y + 4}" fill="#8892B0" font-size="12" text-anchor="end">${v}%</text>`;
    }

    // 2. 40개 연도별 막대그래프 드로잉 (4개 바 그룹화)
    const numYears = labels.length;
    const groupWidth = chartWidth / numYears;  // 연도 그룹당 공간
    const barWidth = groupWidth * 0.17;        // 4개 막대를 정렬하기 위한 바 두께

    for (let i = 0; i < numYears; i++) {
        const groupX = paddingLeft + (i * groupWidth) + (groupWidth * 0.08);
        const year = labels[i];

        // 하단 X축 연도 배치 (글자 겹침 방지를 위해 12px 폰트 최적화)
        html += `<text x="${groupX + (groupWidth * 0.35)}" y="${height - paddingBottom + 22}" fill="#8892B0" font-size="11" text-anchor="middle">${year}</text>`;

        // 4개 지정 전략 데이터 및 색상 바인딩
        const vals = [전략A[i], 전략B[i], 전략C[i], 전략D[i]];
        const colors = ['#E26D5C', '#F4A261', '#1E7B4D', '#2D89C8'];
        const strategyNames = ['A 간단전략', 'B 간단전략 (현금+)', 'C 기본전략', 'D 초분산전략'];

        vals.forEach((val, idx) => {
            const barX = groupX + (idx * (barWidth + 2));
            const barY = getY(Math.max(0, val));
            const targetY = getY(Math.min(0, val));
            const barHeight = Math.abs(targetY - barY);

            html += `<rect class="bar" x="${barX}" y="${barY}" width="${barWidth}" height="${barHeight}" fill="${colors[idx]}" rx="1.5">
                        <title>${year}년 - ${strategyNames[idx]}\n수익률: ${val.toFixed(1)}%</title>
                     </rect>`;
        });
    }

    // SVG 내부에 최종 주입
    svg.innerHTML = html;
</script>

</body>
</html>
