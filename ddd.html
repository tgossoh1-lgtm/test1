<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A전략 적립 시뮬레이션</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group {
            flex: 1;
            min-width: 150px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4b5563;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: right;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 25px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background-color: #f3f4f6;
            color: #1f2937;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f9fafb;
        }
        .highlight {
            font-weight: bold;
            color: #dc2626; /* 추정 자산: 빨간색 */
        }
        .inflation {
            color: #6b7280;
            font-style: italic;
        }
        .profit {
            color: #2563eb; /* 누적 수익: 파란색 */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>아이들 적립 투자 시뮬레이터</h2>
    
    <div class="input-row">
        <div class="input-group">
            <label for="initAssetDisplay">초기 금액 (원)</label>
            <input type="text" id="initAssetDisplay" value="20,000,000" oninput="formatInput(this)">
            <input type="hidden" id="initAsset" value="20000000">
        </div>
        
        <div class="input-group">
            <label for="yearlyAssetDisplay">매년 투자금액 (원)</label>
            <input type="text" id="yearlyAssetDisplay" value="12,000,000" oninput="formatInput(this)">
            <input type="hidden" id="yearlyAsset" value="12000000">
        </div>

        <div class="input-group">
            <label for="currentAge">현재 나이 (세)</label>
            <input type="number" id="currentAge" value="25" min="0" max="100" style="text-align: right;">
        </div>

        <div class="input-group">
            <label for="inflationRate">물가상승률 (%)</label>
            <input type="number" id="inflationRate" value="2.5" step="0.1" min="0" max="20" style="text-align: right;">
        </div>
    </div>
    
    <button onclick="calculateAsset()">자산 계산하기</button>
    
    <table>
        <thead>
            <tr>
                <th>기간</th>
                <th>연도(나이)</th>
                <th>명목 누적원금</th>
                <th>인플레 적용원금</th>
                <th>추정 자산 (명목)</th>
                <th>누적 수익</th>
            </tr>
        </thead>
        <tbody id="resultBody">
            <!-- 결과가 자바스크립트로 주입됩니다. -->
        </tbody>
    </table>
</div>

<script>
    function formatInput(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        let hiddenId = input.id.replace('Display', '');
        document.getElementById(hiddenId).value = value || 0;
        
        if (value) {
            input.value = Number(value).toLocaleString('ko-KR');
        } else {
            input.value = '';
        }
    }

    function formatKoreanMoney(amount) {
        if (amount === 0) return "0원";
        
        let result = "";
        let eon = Math.floor(amount / 100000000);
        let man = Math.floor((amount % 100000000) / 10000);
        
        if (eon > 0) result += eon + "억 ";
        if (man > 0) result += man + "만";
        
        return result.trim() + " 원";
    }

    function calculateAsset() {
        const initAsset = parseFloat(document.getElementById('initAsset').value) || 0;
        const yearlyAsset = parseFloat(document.getElementById('yearlyAsset').value) || 0;
        const currentAge = parseInt(document.getElementById('currentAge').value) || 0;
        const inflationRate = (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;
        const r = 0.108; // A전략 수익률 10.8%
        const currentYear = 2026;
        
        let currentAsset = initAsset;
        let totalPrincipal = initAsset;
        let inflatedPrincipal = initAsset;
        
        const resultBody = document.getElementById('resultBody');
        resultBody.innerHTML = ""; 
        
        // 0년 차 (시작) 출력: 2026년 (25세) 형태로 조립
        appendRow(0, `${currentYear}년 (${currentAge}세)`, totalPrincipal, inflatedPrincipal, currentAsset);

        for (let year = 1; year <= 30; year++) {
            currentAsset = (currentAsset + yearlyAsset) * (1 + r);
            totalPrincipal += yearlyAsset;
            inflatedPrincipal = (inflatedPrincipal + yearlyAsset) * (1 + inflationRate);
            
            // 5년 단위 출력
            if (year % 5 === 0) {
                const targetYear = currentYear + year;
                const targetAge = currentAge + year;
                appendRow(year, `${targetYear}년 (${targetAge}세)`, totalPrincipal, inflatedPrincipal, currentAsset);
            }
        }
    }

    function appendRow(year, yearAgeLabel, principal, infPrincipal, asset) {
        const resultBody = document.getElementById('resultBody');
        const profit = asset - principal;
        
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${year}년 차</td>
            <td>${yearAgeLabel}</td>
            <td>${formatKoreanMoney(principal)}</td>
            <td class="inflation">${formatKoreanMoney(Math.round(infPrincipal))}</td>
            <td class="highlight">${formatKoreanMoney(Math.round(asset))}</td>
            <td class="profit">${year === 0 ? '0원' : '+' + formatKoreanMoney(Math.round(profit))}</td>
        `;
        resultBody.appendChild(row);
    }

    window.onload = calculateAsset;
</script>

</body>
</html>
